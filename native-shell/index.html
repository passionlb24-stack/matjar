<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>متجر</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #1556c2;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Tahoma,
          sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        color: #fff;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .logo {
        width: 76px;
        height: 76px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.14);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        font-weight: 800;
      }
      .brand {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .msg {
        font-size: 14px;
        opacity: 0.85;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">م</div>
      <div class="brand">متجر</div>
      <div class="spinner"></div>
      <div class="msg">عم نحمّل… تأكّد من اتصالك بالإنترنت</div>
    </div>
  </body>
</html>
